<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="traffic-light">
        <div id="red" style="background-color: red; width: 100px; height: 100px; border-radius: 50%;"></div>
        <div id="yellow" style="background-color: white; width: 100px; height: 100px; border-radius: 50%;"></div>
        <div id="green" style="background-color: white; width: 100px; height: 100px; border-radius: 50%;"></div>
    </div>
    <button id="btn">切换灯</button>
</body>
<script>
    const trafficLight = document.getElementById('traffic-light');
    const red = document.getElementById('red');
    const yellow = document.getElementById('yellow');
    const green = document.getElementById('green');
    const btn = document.getElementById('btn');
    let currentLight = 'red';

    function changeLight() {
        if (currentLight === 'red') {
            red.style.backgroundColor = 'white';
            yellow.style.backgroundColor = 'yellow';
            currentLight = 'yellow';
        } else if (currentLight === 'yellow') {
            yellow.style.backgroundColor = 'white';
            green.style.backgroundColor = 'green';
            currentLight = 'green';
        } else if (currentLight === 'green') {
            green.style.backgroundColor = 'white';
            red.style.backgroundColor = 'red';
            currentLight = 'red';
        }
    }

    btn.onclick = changeLight;

    function autoChangeLight() {
        setInterval(() => {
            changeLight();
        }, 1000);
    }
</script>

</html>
