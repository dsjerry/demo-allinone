<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>

<body>
    <button id="btn">反转DOM</button>
    <div id="a">
        <span>1</span>
        <p>2</p>
        <p>3</p>
        <div>4</div>
    </div>
</body>
<script>
    const element = document.getElementById('a');

    function reverseChildren(element) {
        const range = new Range();
        range.selectNodeContents(element);

        const fragment = range.extractContents();
        for (let i = fragment.childNodes.length - 1; i >= 0; i--) {
            fragment.appendChild(fragment.childNodes[i]);
        }
        element.appendChild(fragment);
    }

    document.getElementById('btn').onclick = () => reverseChildren(element);

    document.styleSheets[0].insertRule('p { color: red; }', 0);

    const computedStyle = getComputedStyle(document.getElementById('a'), 'span').fontSize;
    console.log(computedStyle);

</script>

</html>
