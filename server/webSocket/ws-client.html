<!DOCTYPE html>
<html>
  <head>
    <title>WebSocket 客户端测试</title>
  </head>
  <body>
    <script>
      // 创建一个 WebSocket 连接，使用 ws:// 协议，端口为 8080
      const ws = new WebSocket("ws://localhost:3000");

      // 连接打开时触发
      ws.onopen = () => {
        console.log("已连接到服务器");
        ws.send("Hello, Server!");
      };

      // 收到服务器消息时触发
      ws.onmessage = (event) => {
        console.log("收到服务器消息: ", event.data);
      };

      // 连接关闭时触发
      ws.onclose = () => {
        console.log("与服务器的连接已关闭");
      };

      // 发生错误时触发
      ws.onerror = (error) => {
        console.error("WebSocket 错误: ", error);
      };
    </script>
  </body>
</html>
