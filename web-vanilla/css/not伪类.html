<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: darkslategrey;
      }
      img {
        width: 200px;
        transition: all 0.5s;
      }
      .container {
        display: flex;
        gap: 20px;
      }
      .container:hover > :not(:hover) {
        filter: grayscale();
        opacity: 0.5;
        scale: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="../images//iu_1.jpg" alt="" />
      <img src="../images//iu_2.jpg" alt="" />
      <img src="../images//iu_3.jpg" alt="" />
    </div>
  </body>
</html>
