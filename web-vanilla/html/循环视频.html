<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>循环视频优化</title>
  </head>
  <body>
    <div class="video-container">
      <video id="bgVideo" autoplay muted playsinline class="bg-video" preload="auto">
        <source src="car-4s.mp4" type="video/mp4" />
      </video>
      <div class="video-mask"></div>
    </div>

    <!-- 登录表单 -->
    <div class="login-wrapper">
      <div class="login-box">
        <h1 class="login-title">欢迎登录</h1>
        <p class="login-subtitle">请输入您的账号信息</p>

        <form id="loginForm" autocomplete="off">
          <div class="input-group">
            <label for="username">用户名</label>
            <input id="username" type="text" placeholder="请输入用户名" required />
          </div>

          <div class="input-group">
            <label for="password">密码</label>
            <input id="password" type="password" placeholder="请输入密码" required />
          </div>

          <div class="options">
            <label class="remember">
              <input type="checkbox" />
              <span>记住我</span>
            </label>
            <a href="#" class="forgot">忘记密码？</a>
          </div>

          <button type="submit" class="login-btn">登 录</button>
        </form>
      </div>
    </div>

    <div id="loading" class="loading">加载中...</div>

    <style>
      .video-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
      }

      .bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transform: translateZ(0) scale(1.02);
        transition: opacity 0.6s ease;
        will-change: opacity;
      }

      .bg-video.ready {
        opacity: 1;
      }

      .video-mask {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.28)), rgba(0, 0, 0, 0.18);
        pointer-events: none;
      }

      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 14px;
        z-index: 1;
        transition: opacity 0.5s;
      }

      .loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* ===== 登录表单样式 ===== */
      .login-wrapper {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        padding: 20px;
      }

      .login-box {
        width: 100%;
        max-width: 400px;
        padding: 40px 36px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px) saturate(1.8);
        -webkit-backdrop-filter: blur(20px) saturate(1.8);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        animation: slideUp 0.6s ease both;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-title {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 600;
        color: #ffffff;
        text-align: center;
        letter-spacing: 1px;
      }

      .login-subtitle {
        margin: 0 0 28px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.65);
        text-align: center;
      }

      .input-group {
        margin-bottom: 18px;
      }

      .input-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 500;
      }

      .input-group input {
        width: 100%;
        padding: 13px 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(0, 0, 0, 0.22);
        color: #ffffff;
        font-size: 15px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        box-sizing: border-box;
      }

      .input-group input::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }

      .input-group input:focus {
        border-color: rgba(59, 130, 246, 0.6);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }

      .options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        font-size: 13px;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 6px;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
      }

      .remember input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #3b82f6;
        cursor: pointer;
      }

      .forgot {
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        transition: color 0.2s;
      }

      .forgot:hover {
        color: #3b82f6;
      }

      .login-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.35);
      }

      .login-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.45);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      @media (max-width: 480px) {
        .login-box {
          padding: 32px 24px;
        }

        .login-title {
          font-size: 24px;
        }
      }
    </style>

    <script>
      const video = document.getElementById("bgVideo");
      const loading = document.getElementById("loading");

      const LOOP_START = 0.08;
      const LOOP_END_OFFSET = 0.12;
      let isSeeking = false;

      function restartBeforeEnd() {
        if (!video.duration || isSeeking) return;

        const loopEnd = video.duration - LOOP_END_OFFSET;

        if (video.currentTime >= loopEnd) {
          isSeeking = true;
          video.currentTime = LOOP_START;
        }
      }

      video.addEventListener("canplaythrough", async () => {
        loading.classList.add("hidden");
        video.classList.add("ready");

        try {
          await video.play();
        } catch (error) {
          console.error("视频自动播放失败:", error);
        }
      });

      video.addEventListener("seeked", () => {
        isSeeking = false;
        if (video.paused) video.play();
      });

      video.addEventListener("timeupdate", restartBeforeEnd);

      video.addEventListener("error", () => {
        loading.textContent = "视频加载失败";
      });

      // 登录表单提交
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        console.log("登录请求:", { username, password });
        // 这里可以添加实际的登录逻辑
        alert("登录演示: 用户名 " + username);
      });
    </script>
  </body>
</html>
