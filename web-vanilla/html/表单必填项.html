<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <style>
        span:has(+ input[data-required])::after {
            content: "*";
            color: red;
        }
    </style>
    <body>
        <div>
            <label>
                <span>姓名</span>
                <input data-required type="text" />
            </label>
            <label>
                <span>性别</span>
                <input type="text" />
            </label>
        </div>
    </body>
</html>
